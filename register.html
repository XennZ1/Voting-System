<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - MULAT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cover">
    <div class="overlay">

        <div class="register-box">
            <h1 class="title">MULAT</h1>
            <p class="subtitle">Registration</p>

            <form id="regForm">

                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>

                <!-- ROLE -->
                <select required>
                    <option value="">Select Role</option>
                    <option>Super Admin</option>
                    <option>Election Officer</option>
                    <option>Auditor</option>
                    <option>Voter</option>
                </select>

                <!-- COLLEGE -->
                <select required>
                    <option>College of Information and Communication Technology</option>
                </select>

                <!-- COURSE -->
                <select required>
                    <option value="">Select Course</option>
                    <option>BSIT - Bachelor of Science in Information Technology</option>
                    <option>BSIS - Bachelor of Science in Information System</option>
                    <option>BLISS - Bachelor of Library and Information Science</option>
                </select>

                <!-- YEAR -->
                <select required>
                    <option value="">Year Level</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>

                <!-- BIRTHDATE -->
                <div class="dob">
                    <select required>
                        <option>Month</option>
                        <option>January</option><option>February</option>
                        <option>March</option><option>April</option>
                    </select>

                    <select required>
                        <option>Day</option>
                        <option>1</option><option>2</option><option>3</option>
                    </select>

                    <select required>
                        <option>Year</option>
                        <option>2000</option><option>2001</option>
                        <option>2002</option>
                    </select>
                </div>

                <button type="submit" class="btn">NEXT</button>
                <a href="admin.html" class="btn back">BACK</a>

            </form>
        </div>

    </div>
</div>

<script>
document.getElementById("regForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("User successfully registered!");

    // clear form
    this.reset();
});
</script>

</body>
</html>
